name: Daily VoiceEvals Commit

on:
  schedule:
    - cron: '0 13 * * *'   # 1pm UTC = 8am EST / 5am PST
  workflow_dispatch:        # allow manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  daily-commit:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Configure git
        run: |
          git config user.name "VoiceEvals Bot"
          git config user.email "rohitbchandrasekar@gmail.com"

      - name: Run daily improvement
        env:
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
        run: python scripts/daily.py
